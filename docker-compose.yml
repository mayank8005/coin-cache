services:
  app:
    build: .
    image: coin-cache:latest
    container_name: coin-cache
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/data.db
    volumes:
      - coin-cache-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  coin-cache-data:
    driver: local
